<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirtan Patel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav id="navbar" class="hidden">
        <h1>Kirtan Patel</h1>
    </nav>
    <header id="landing">
        <div class="container">
            <div class="text-side">
                <h1>I am <span class="highlight">Kirtan Patel</span></h1>
                <div class="careers">
                    <span class="career"></span><span class="cursor">|</span>
                </div>
            </div>
            <div class="image-side">
                <img src="IMG_1045 2.jpg" alt="Kirtan's Face">
            </div>
        </div>
    </header>
    <section id="resume">
        <div class="resume-container">
            <embed src="Kirtan_Resume.pdf" type="application/pdf" width="100%" height="1000px" class="pdf-embeded"/>
        </div>
    </section>
    
    <script src="script.js"></script>
</body>
</html>
